name: Frontend CI/CD

on:
  pull_request:
    branches: [main]
    paths: ["frontend/**"]
  push:
    branches: [main]
    paths: ["frontend/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  # ── PR checks ────────────────────────────────────────────────
  test:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: test
        run: npm test

      - name: build
        run: npm run build

  # ── Deploy on main ───────────────────────────────────────────
  deploy:
    name: deploy to Static Web Apps
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: test
        run: npm test

      - name: build
        run: npm run build
        env:
          VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_AUTHORITY: ${{ vars.VITE_AZURE_AUTHORITY }}
          VITE_API_SCOPE: ${{ vars.VITE_API_SCOPE }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: deploy to Static Web Apps
        run: |
          npx --yes @azure/static-web-apps-cli deploy ../frontend/dist \
            --deployment-token "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}" \
            --env production
        timeout-minutes: 15
